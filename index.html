<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMARKO - BPS Kabupaten Belitung</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .selection-blue::selection { background-color: #dbeafe; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }

        .highlight-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .stat-card-glow {
            box-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="min-h-screen bg-[#f8fafc] text-slate-900 selection-blue overflow-x-hidden">

    <!-- Ornamen Latar Belakang -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-blue-100/40 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-100/30 blur-[100px]"></div>
    </div>

    <div id="app" class="relative z-10 flex flex-col min-h-screen">
        <!-- Konten dikelola oleh JavaScript -->
    </div>

    <script>
        // Konfigurasi Link
        const CONFIG = {
            logoUrl: `https://lh3.googleusercontent.com/d/1wdO4pFct6MG6itzbKvwAAcMXBXz8523N`,
            previewUrl: `https://drive.google.com/file/d/1ryX7WPEkk7w8EG287ysehUJMLaYlZvkG/preview`,
            downloadUrl: `https://drive.google.com/file/d/1ryX7WPEkk7w8EG287ysehUJMLaYlZvkG/view?usp=sharing`,
            skTimUrl: "https://drive.google.com/file/d/1EYm_dWzV4eh4yDxNxClyvLRUgsNMP7-w/view?usp=drive_link",
            materiSosialisasiUrl: "https://drive.google.com/drive/folders/1RR5DRhYvSKdPQXx7urWwlgs0wv_LU02w?usp=sharing",
            
            kertasKerjaMrUrl: "https://docs.google.com/spreadsheets/d/130t925qSK9NYAusdKqxxZDoIEgoNmNejEllUip9Nj5o/edit?gid=666067745#gid=666067745", 
            pemantauanRisikoUrl: "https://docs.google.com/spreadsheets/d/1eP49Ho26uXyspYFChscbqthKWxNuD0Bd/edit?usp=drive_link&ouid=115730438453768465879&rtpof=true&sd=true",
            formProgressUrl: "https://docs.google.com/spreadsheets/d/1T2tjP76iTd7eMx2qtqxdvPhExxwPT3dhxKQqoSaSmsA/edit?usp=drive_link", 
            
            mariTemanUrl: "https://risiko.web.bps.go.id/app/",
            mrpkBabelUrl: "https://babel.web.bps.go.id/mrpk/index.php",
            qualityGatesSheetUrl: "https://docs.google.com/spreadsheets/d/1HXneNP1-9eKyEF76vGFXuystevnZnKuJ/edit?gid=2036669957#gid=2036669957", 
            laporanQgUrl: "https://drive.google.com/drive/folders/1EMdoCnuTY0Aob9X_7S2WN-MkSe39eYZI?usp=drive_link",
            aplikasiQgateUrl: "https://nqaf.web.bps.go.id/qgate/",
            sheetId: "1T2tjP76iTd7eMx2qtqxdvPhExxwPT3dhxKQqoSaSmsA" 
        };

        const uploadMenuData = [
            { id: 1, title: "Tim Sub Bagian Umum", url: "https://drive.google.com/drive/folders/1-v8iahBfcuZSk3uB6dIyzZJlns_PEX9S?usp=drive_link", icon: 'briefcase', color: 'text-indigo-600' },
            { id: 2, title: "Tim Kerja Statistik Sosial", url: "https://drive.google.com/drive/folders/1rq4hGqo7QrD7cnIOZwHBgIUZxyTpVzqr?usp=drive_link", icon: 'users', color: 'text-sky-600' },
            { id: 3, title: "Tim Kerja Statistik Produksi", url: "https://drive.google.com/drive/folders/1QMyq4TMTTaKlbE82EgP047tBHF4Ieqw_?usp=drive_link", icon: 'factory', color: 'text-orange-600' },
            { id: 4, title: "Tim Kerja Statistik Harga", url: "https://drive.google.com/drive/folders/1j_wWDrc6aEu-KLJoJSgAKXgSBsQvUc15?usp=drive_link", icon: 'tag', color: 'text-amber-600' },
            { id: 5, title: "Tim Kerja Statistik Distribusi dan KTIP", url: "https://drive.google.com/drive/folders/1V4bYRe91woNrLxdzuW0tJGcn6BtaDowu?usp=drive_link", icon: 'trending-up', color: 'text-emerald-600' },
            { id: 6, title: "Tim Kerja Neraca Wilayah dan Analisis Statistik", url: "https://drive.google.com/drive/folders/1ns5TCnvKIkpiatHn-ZbkZLbXnuOJI8NJ?usp=drive_link", icon: 'pie-chart', color: 'text-purple-600' },
            { id: 7, title: "Tim Kerja Pengolahan dan Teknologi Informasi", url: "https://drive.google.com/drive/folders/1fyRFF4a27CoUm5X_xCeaTggwDzdu07HQ?usp=drive_link", icon: 'monitor', color: 'text-cyan-600' },
            { id: 8, title: "Tim Kerja Diseminasi Statistik", url: "https://drive.google.com/drive/folders/1maOoUlg60eiSp3MMTQuW7szng1YQ9WZO?usp=drive_link", icon: 'globe', color: 'text-blue-600' },
            { id: 9, title: "Tim Sensus, Pengembangan Survei dan Manajemen Lapangan, Mitra", url: "https://drive.google.com/drive/folders/15EOeYljW705pdlR3pAFOw9R4w8WlW5Yd?usp=drive_link", icon: 'user-plus', color: 'text-slate-600' },
            { id: 10, title: "Tim Kerja Hubungan Masyarakat", url: "https://drive.google.com/drive/folders/146NJuhw8u20wTAZYxv7fNT0Ub8p8DJo2?usp=drive_link", icon: 'megaphone', color: 'text-rose-600' },
            { id: 11, title: "Tim Kerja Pembinaan Pelaksanaan Statistik Sektoral dan Penilai Badan", url: "https://drive.google.com/drive/folders/1r1Zaith7vlZ18_NZ9YIf_cQ9EiCXwN_G?usp=drive_link", icon: 'award', color: 'text-fuchsia-600' },
            { id: 12, title: "Tim Kerja Reformasi Birokrasi", url: "https://drive.google.com/drive/folders/1Q5-eXHtwFjZWozF1IRJ5z6Rdx9EHse5e?usp=drive_link", icon: 'scale', color: 'text-yellow-600' },
            { id: 13, title: "Tim Kerja Manajemen Risiko dan Penjaminan Kualitas", url: "https://drive.google.com/drive/folders/1GFaBekDiFriMEzvPoiHVxhF_U-rH-t5S?usp=drive_link", icon: 'shield-check', color: 'text-emerald-600' },
        ];

        let state = {
            currentPage: 'home',
            timData: [],
            availableYears: [],
            selectedYear: null,
            isLoading: false
        };

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        // Helper function yang diperbarui untuk mendapatkan URL Drive lebih akurat
        function getDriveUrl(title) {
            const t = title.toLowerCase();
            if (t.includes("umum")) return uploadMenuData[0].url;
            if (t.includes("sosial")) return uploadMenuData[1].url;
            if (t.includes("produksi")) return uploadMenuData[2].url;
            if (t.includes("harga")) return uploadMenuData[3].url;
            if (t.includes("distribusi") || t.includes("ktip")) return uploadMenuData[4].url;
            if (t.includes("neraca")) return uploadMenuData[5].url;
            if (t.includes("pengolahan") || t.includes("teknologi")) return uploadMenuData[6].url;
            if (t.includes("diseminasi")) return uploadMenuData[7].url;
            if (t.includes("sensus") || t.includes("mitra") || t.includes("lapangan")) return uploadMenuData[8].url;
            if (t.includes("humas") || t.includes("masyarakat")) return uploadMenuData[9].url;
            if (t.includes("sektoral") || t.includes("pembinaan") || t.includes("penilai")) return uploadMenuData[10].url;
            if (t.includes("reformasi") || t.includes("rb")) return uploadMenuData[11].url;
            if (t.includes("manajemen risiko") || t.includes("mrpk")) return uploadMenuData[12].url;
            return "#";
        }

        async function fetchDashboardData() {
            setState({ isLoading: true });
            try {
                const url = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:json`;
                const response = await fetch(url);
                const text = await response.text();
                const startMarker = "google.visualization.Query.setResponse(";
                const startIdx = text.indexOf(startMarker);
                
                if (startIdx !== -1) {
                    const jsonContent = text.substring(startIdx + startMarker.length, text.length - 2);
                    const jsonData = JSON.parse(jsonContent);
                    const cols = jsonData.table.cols;
                    const rows = jsonData.table.rows;

                    const colMap = {
                        tim: cols.findIndex(c => c.label.toLowerCase().includes('tim')),
                        tahun: cols.findIndex(c => c.label.toLowerCase().includes('tahun')),
                        jml: cols.findIndex(c => c.label.toLowerCase().includes('jml')),
                        target: cols.findIndex(c => c.label.toLowerCase().includes('target')),
                        identifikasi: cols.findIndex(c => c.label.toLowerCase().includes('identifikasi')),
                        analisis: cols.findIndex(c => c.label.toLowerCase().includes('analisis')),
                        rtp: cols.findIndex(c => c.label.toLowerCase().includes('rtp')),
                        progres: cols.findIndex(c => c.label.toLowerCase().includes('progres')),
                        sedang: cols.findIndex(c => c.label.toLowerCase() === 'sedang'),
                        tinggi: cols.findIndex(c => c.label.toLowerCase() === 'tinggi'),
                        sangatTinggi: cols.findIndex(c => c.label.toLowerCase() === 'sangat tinggi')
                    };
                    
                    let mappedData = rows.map((row, index) => {
                        const c = row.c;
                        const title = c[colMap.tim]?.v || "Tim Tidak Diketahui";
                        
                        // Gunakan algoritma pencocokan yang baru agar link selalu akurat
                        const driveLink = getDriveUrl(title);
                        
                        return {
                            id: index,
                            title: title,
                            year: c[colMap.tahun]?.v ? String(c[colMap.tahun]?.v) : "2024",
                            icon: getIconName(title),
                            color: getIconColor(title),
                            driveUrl: driveLink,
                            levels: { 
                                sedang: Number(c[colMap.sedang]?.v) || 0, 
                                tinggi: Number(c[colMap.tinggi]?.v) || 0, 
                                sangatTinggi: Number(c[colMap.sangatTinggi]?.v) || 0 
                            },
                            stats: { 
                                jml: Number(c[colMap.jml]?.v) || 0, 
                                target: Number(c[colMap.target]?.v) || 0, 
                                identifikasi: Number(c[colMap.identifikasi]?.v) || 0, 
                                analisis: Number(c[colMap.analisis]?.v) || 0, 
                                rtp: Number(c[colMap.rtp]?.v) || 0, 
                                progress: (Number(c[colMap.progres]?.v) || 0) * (c[colMap.progres]?.v <= 1 ? 100 : 1) 
                            }
                        };
                    });

                    mappedData.sort((a, b) => {
                        if (b.levels.sangatTinggi !== a.levels.sangatTinggi) return b.levels.sangatTinggi - a.levels.sangatTinggi;
                        if (b.levels.tinggi !== a.levels.tinggi) return b.levels.tinggi - a.levels.tinggi;
                        return b.levels.sedang - a.levels.sedang;
                    });

                    const years = [...new Set(mappedData.map(d => d.year))].sort((a, b) => b - a);
                    setState({ 
                        timData: mappedData, 
                        availableYears: years, 
                        selectedYear: state.selectedYear || years[0], 
                        isLoading: false 
                    });
                }
            } catch (error) {
                console.error("Gagal mengambil data dashboard:", error);
                setState({ isLoading: false });
            }
        }

        function getIconName(title) {
            const t = title.toLowerCase();
            if (t.includes("umum")) return 'briefcase';
            if (t.includes("sosial")) return 'users';
            if (t.includes("produksi")) return 'factory';
            if (t.includes("harga")) return 'tag';
            if (t.includes("distribusi")) return 'trending-up';
            if (t.includes("neraca")) return 'pie-chart';
            if (t.includes("pengolahan")) return 'monitor';
            if (t.includes("diseminasi")) return 'globe';
            if (t.includes("sensus")) return 'user-plus';
            if (t.includes("humas")) return 'megaphone';
            if (t.includes("sektoral")) return 'award';
            if (t.includes("reformasi")) return 'scale';
            if (t.includes("manajemen risiko")) return 'shield-check';
            return 'activity';
        }

        function getIconColor(title) {
            const t = title.toLowerCase();
            if (t.includes("umum")) return 'text-indigo-600';
            if (t.includes("sosial")) return 'text-sky-600';
            if (t.includes("produksi")) return 'text-orange-600';
            if (t.includes("harga")) return 'text-amber-600';
            if (t.includes("distribusi")) return 'text-emerald-600';
            if (t.includes("neraca")) return 'text-purple-600';
            if (t.includes("pengolahan")) return 'text-cyan-600';
            if (t.includes("diseminasi")) return 'text-blue-600';
            if (t.includes("sensus")) return 'text-slate-600';
            if (t.includes("humas")) return 'text-rose-600';
            if (t.includes("sektoral")) return 'text-fuchsia-600';
            if (t.includes("reformasi")) return 'text-yellow-600';
            if (t.includes("manajemen risiko")) return 'text-emerald-600';
            return 'text-slate-400';
        }

        function render() {
            const app = document.getElementById('app');
            let content = '';

            const footer = `
                <footer class="relative z-10 py-12 mt-auto">
                    <div class="container mx-auto px-6 text-center">
                        <div class="max-w-7xl mx-auto glass-header rounded-[2.5rem] p-8 flex flex-col md:flex-row items-center justify-between gap-6">
                            <div class="flex items-center gap-5">
                                <img src="${CONFIG.logoUrl}" alt="Logo" class="w-12 h-12 object-contain" />
                                <div class="text-left">
                                    <p class="text-slate-900 font-bold text-lg tracking-tight uppercase leading-none italic">SIMARKO</p>
                                    <p class="text-slate-500 text-[10px] font-semibold uppercase tracking-[0.2em] mt-1">BPS Kabupaten Belitung</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 bg-white/50 px-6 py-3 rounded-2xl shadow-sm border border-white/50">
                                <span class="text-xs font-bold text-slate-400">&copy; ${new Date().getFullYear()}</span>
                                <div class="w-px h-4 bg-slate-200 mx-2"></div>
                                <span class="text-xs font-bold text-slate-600 uppercase tracking-widest italic">Tim MRPK</span>
                                <i data-lucide="heart" class="w-4 h-4 text-rose-500 fill-rose-500 animate-pulse"></i>
                            </div>
                        </div>
                    </div>
                </footer>
            `;

            switch (state.currentPage) {
                case 'home': content = renderHome(); break;
                case 'materi': content = renderMateri(); break;
                case 'upload': content = renderUpload(); break;
                case 'dashboard': content = renderDashboard(); break;
                case 'quality': content = renderQualityGates(); break;
            }

            app.innerHTML = `<div class="flex-grow">${content}</div>${footer}`;
            lucide.createIcons();
        }

        function renderHome() {
            return `
                <div class="relative z-10 container mx-auto px-6 py-12 lg:py-16">
                    <header class="max-w-7xl mx-auto mb-20">
                        <div class="glass-header rounded-[3.5rem] p-8 md:p-14 relative overflow-hidden flex flex-col lg:flex-row items-center gap-10 md:gap-20 transition-all duration-700 animate-in">
                            <div class="absolute top-0 right-0 p-10 opacity-[0.03] pointer-events-none transform translate-x-1/4 -translate-y-1/4">
                                <i data-lucide="shield-check" class="w-[500px] h-[500px] text-slate-900"></i>
                            </div>
                            <div class="relative z-10 flex-shrink-0">
                                <div class="w-36 h-36 md:w-48 md:h-48 bg-white rounded-[3rem] p-8 shadow-2xl flex items-center justify-center transform hover:rotate-3 transition-transform duration-500 border border-slate-100">
                                    <img src="${CONFIG.logoUrl}" alt="Logo SIMARKO" class="w-full h-full object-contain" />
                                </div>
                            </div>
                            <div class="relative z-10 text-center lg:text-left flex-1">
                                <div class="inline-flex items-center gap-2 px-5 py-2 bg-blue-600 text-white rounded-full font-bold text-[10px] uppercase tracking-[0.3em] mb-6 shadow-lg shadow-blue-200">
                                    <i data-lucide="check-circle-2" class="w-3 h-3"></i> Official Dashboard
                                </div>
                                <h1 class="text-6xl md:text-8xl font-black tracking-tighter text-slate-900 mb-6 italic uppercase leading-none">SIMARKO</h1>
                                <div class="space-y-2 border-l-4 border-blue-600 pl-6 lg:pl-8">
                                    <h2 class="text-xl md:text-2xl font-bold text-slate-700 tracking-wide uppercase leading-tight">Sistem Manajemen Risiko <span class="text-blue-600">&</span> Penjaminan Kualitas</h2>
                                    <p class="text-slate-500 font-semibold italic tracking-widest text-sm uppercase">Badan Pusat Statistik Kabupaten Belitung</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <button onclick="setState({currentPage: 'materi'})" class="group bg-white rounded-[2.5rem] p-10 transition-all duration-500 hover:shadow-2xl shadow-indigo-100 border border-slate-100 flex flex-col items-center text-center hover:-translate-y-3 min-h-[300px]">
                            <div class="mb-6 p-6 bg-indigo-50 rounded-[1.8rem] group-hover:scale-110 group-hover:bg-indigo-600 transition-all"><i data-lucide="book-open" class="w-12 h-12 text-indigo-600 group-hover:text-white"></i></div>
                            <h3 class="text-2xl font-black text-slate-800 mb-3 uppercase italic">Materi MR</h3>
                            <p class="text-slate-500 text-sm mb-6 leading-relaxed">Pedoman, surat keputusan, dan materi sosialisasi manajemen risiko</p>
                            <div class="mt-auto w-full py-4 px-6 bg-slate-50 rounded-2xl text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-all font-bold text-[10px] tracking-widest uppercase flex justify-center items-center gap-2">Buka Materi <i data-lucide="chevron-right" class="w-4 h-4"></i></div>
                        </button>
                        
                        <button onclick="navigateToDashboard()" class="group relative bg-slate-900 rounded-[2.5rem] p-10 transition-all duration-500 hover:shadow-2xl shadow-emerald-900/20 flex flex-col items-center text-center hover:-translate-y-4 min-h-[340px] border-b-[12px] border-emerald-500 overflow-hidden lg:scale-105 z-20">
                            <div class="absolute top-0 right-0 p-6 opacity-10"><i data-lucide="layout-dashboard" class="w-32 h-32 text-white"></i></div>
                            <div class="mb-6 p-6 bg-emerald-500/20 rounded-[1.8rem] relative z-10"><i data-lucide="layout-dashboard" class="w-12 h-12 text-emerald-400"></i></div>
                            <h3 class="text-3xl font-black text-white mb-2 uppercase italic tracking-wider">Dashboard</h3>
                            <p class="text-slate-400 text-sm mb-10 leading-relaxed italic px-4">Monitoring Pengisian Matriks Risiko</p>
                            <div class="mt-auto w-full py-5 px-6 bg-emerald-600 rounded-2xl text-white font-bold text-[10px] tracking-widest uppercase flex justify-center items-center gap-3 shadow-lg group-hover:bg-emerald-500 transition-all">Lihat Monitoring <i data-lucide="chevron-right" class="w-5 h-5"></i></div>
                        </button>

                        <button onclick="setState({currentPage: 'upload'})" class="group bg-white rounded-[2.5rem] p-10 transition-all duration-500 hover:shadow-2xl shadow-orange-100 border border-slate-100 flex flex-col items-center text-center hover:-translate-y-3 min-h-[300px]">
                            <div class="mb-6 p-6 bg-orange-50 rounded-[1.8rem] group-hover:scale-110 group-hover:bg-orange-600 transition-all"><i data-lucide="cloud-upload" class="w-12 h-12 text-orange-600 group-hover:text-white"></i></div>
                            <h3 class="text-2xl font-black text-slate-800 mb-3 uppercase italic">Upload Matriks</h3>
                            <p class="text-slate-500 text-sm mb-6 leading-relaxed">Unggah dokumen matriks risiko ke folder tim masing-masing</p>
                            <div class="mt-auto w-full py-4 px-6 bg-slate-50 rounded-2xl text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-all font-bold text-[10px] tracking-widest uppercase flex justify-center items-center gap-2">Pilih Tim <i data-lucide="chevron-right" class="w-4 h-4"></i></div>
                        </button>
                    </main>

                    <div class="max-w-7xl mx-auto mt-8 grid grid-cols-1 md:grid-cols-3 gap-8">
                        <a href="${CONFIG.mariTemanUrl}" target="_blank" class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-[2rem] p-8 flex flex-col items-center text-center group hover:shadow-xl transition-all border-b-4 border-blue-400">
                            <h4 class="text-white font-black italic uppercase tracking-widest mb-2">MARI TEMAN</h4>
                            <p class="text-blue-100 text-xs mb-6">Portal Manajemen Risiko BPS Pusat</p>
                            <div class="mt-auto flex items-center gap-2 text-[10px] font-bold text-white/80 group-hover:text-white uppercase tracking-[0.2em] transition-colors">Akses Link <i data-lucide="external-link" class="w-3 h-3"></i></div>
                        </a>
                        <button onclick="setState({currentPage: 'quality'})" class="bg-white rounded-[2rem] p-8 flex flex-col items-center text-center group border-4 border-purple-500 hover:shadow-xl hover:-translate-y-2 transition-all">
                            <h4 class="text-slate-800 font-black italic uppercase tracking-widest mb-2">QUALITY GATES</h4>
                            <p class="text-slate-500 text-xs mb-6">Penjaminan Kualitas Data</p>
                            <div class="mt-auto flex items-center gap-2 text-[10px] font-bold text-purple-600 uppercase tracking-[0.2em] group-hover:scale-110 transition-transform">Buka Menu <i data-lucide="shield-check" class="w-3 h-3"></i></div>
                        </button>

                            </a>
                            <a href="${CONFIG.laporanQgUrl}" target="_blank" class="group bg-white rounded-[2.5rem] p-10 transition-all duration-500 hover:shadow-2xl shadow-slate-200 border border-slate-100 flex flex-col items-center text-center hover:-translate-y-2 relative overflow-hidden h-full">

                                <div class="mt-auto w-full py-5 px-6 bg-slate-50 rounded-2xl text-slate-400 group-hover:bg-indigo-600 group-hover:text-white transition-all font-bold text-[10px] tracking-widest uppercase flex justify-center items-center gap-2">Buka Folder Drive <i data-lucide="external-link" class="w-4 h-4"></i></div>

                        </div>
                    </div>
                </div>
            `;
